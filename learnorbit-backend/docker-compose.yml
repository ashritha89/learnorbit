version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: cyberorbit-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - cyberorbit-network

volumes:
  redis-data:
    driver: local

networks:
  cyberorbit-network:
    driver: bridge
